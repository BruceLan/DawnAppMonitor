name: Apple App Monitor

on:
  # 定时执行：每半小时执行一次
  schedule:
    - cron: '7,37 * * * *'  # 每小时的第 7 分钟和 37 分钟执行
  
  # 支持手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run monitor script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_URL: ${{ secrets.FEISHU_WIKI_URL }}
          FEISHU_CHAT_ID_ALL: ${{ secrets.FEISHU_CHAT_ID_ALL }}
          FEISHU_CHAT_ID_TEAM: ${{ secrets.FEISHU_CHAT_ID_TEAM }}
          FEISHU_MENTION_USERS: ${{ secrets.FEISHU_MENTION_USERS }}
          FEISHU_MESSAGE_PREFIX: ${{ secrets.FEISHU_MESSAGE_PREFIX }}
          ENABLE_RECORD_REVIEW: ${{ secrets.ENABLE_RECORD_REVIEW }}
        run: |
          python monitor_apple.py
      
      - name: Upload logs (if needed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: |
            *.log
          retention-days: 7
